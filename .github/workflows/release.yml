name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: HUSKY=0 npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run release:check
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES="$(awk -v v="$VERSION" '/^## /{if(flag)exit; flag=(index($0,"## " v " ")==1)} flag && !/^## /' CHANGELOG.md)"
          if gh release view "$VERSION" &>/dev/null; then
            gh release upload "$VERSION" dist/build/main.js dist/build/manifest.json dist/build/styles.css --clobber
          else
            gh release create "$VERSION" dist/build/main.js dist/build/manifest.json dist/build/styles.css \
              --title "$VERSION" \
              --notes "$NOTES"
          fi
