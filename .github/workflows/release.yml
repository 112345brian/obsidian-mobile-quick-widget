name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run release:check
      - run: npm run lint
      - run: npm run build
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NOTES="$(awk '/^## '"$VERSION"' /{flag=1; next} /^## /{flag=0} flag{print}' CHANGELOG.md)"
          gh release create "$VERSION" dist/build/main.js dist/build/manifest.json dist/build/styles.css \
            --title "$VERSION" \
            --notes "$NOTES" \
          || gh release upload "$VERSION" dist/build/main.js dist/build/manifest.json dist/build/styles.css --clobber
